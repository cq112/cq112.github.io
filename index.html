<!DOCTYPE html>

<title>Tongyu QIU</title>

<style>

:root{

--text:#374151;
--muted:#6B7280;

--blue:#A7BFD9;
--lavender:#C6C2D9;
--sage:#BFD4C0;
--rose:#D9B8B8;

--card:#ffffff;
--maxw:900px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.7;
}

header{
border-bottom:1px solid #e5e7eb;
background:white;
}

.nav{
max-width:var(--maxw);
margin:auto;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
font-weight:700;
font-size:1.2rem;
text-decoration:none;
color:var(--text);
}

.nav-links{
display:flex;
gap:16px;
}

.nav-links a{
text-decoration:none;
padding:8px 14px;
border-radius:8px;
color:white;
font-size:0.9rem;
}

.about{background:var(--blue)}
.research{background:var(--sage)}
.publications{background:var(--lavender)}
.cv{background:var(--rose)}
.contact{background:var(--blue)}

main{
max-width:var(--maxw);
margin:auto;
padding:60px 20px;
text-align:center;
}

h1{
font-size:2.6rem;
margin-bottom:14px;
}

p{
color:var(--muted);
max-width:650px;
margin:auto;
}

.hero-card{
margin-top:40px;
background:var(--card);
padding:30px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

footer{
text-align:center;
padding:30px;
font-size:0.9rem;
color:var(--muted);
}

</style>
</head>

<a class="publications" href="publications.html" target="_blank">Publications</a>
<a class="cv" href="cv.html" target="_blank">CV</a>
<a class="contact" href="contact.html" target="_blank">Contact</a>
</div>

</div>
</header>

<main>
